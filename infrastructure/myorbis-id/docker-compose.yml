name: myorbis-id
# MyOrbis Account Hub — identity provider (Keycloak) + its own Postgres.
# Parent-brand (MyOrbisResults) SSO. Runs on box #1 as an ISOLATED stack:
# own network (myorbis_id_net), own volume, own DB — shares nothing with the
# MyOrbisVoice stack on the same host.
#
# Internal-first: Keycloak is bound to 127.0.0.1 only. Public exposure (a
# hostname via the shared Caddy edge + TLS) is a deliberate later step once the
# IdP hostname + DNS are decided.
services:
  db:
    image: postgres:16-alpine
    container_name: myorbis-id-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - id_db:/var/lib/postgresql/data
    networks: [id_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 6

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: myorbis-id-keycloak
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://myorbis-id-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      # When exposed publicly, add: KC_HOSTNAME: https://<idp-host>
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"   # http (admin/SSO) — localhost only until proxied
      - "127.0.0.1:9000:9000"   # management/health — localhost only
    networks: [id_net]

networks:
  id_net:
    name: myorbis_id_net

volumes:
  id_db:
