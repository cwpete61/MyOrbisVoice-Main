name: myorbisvoice

services:
  postgres:
    image: postgres:16-alpine
    container_name: myorbisvoice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voiceautomation}
      POSTGRES_USER: ${POSTGRES_USER:-voiceautomation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voiceautomation}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: myorbisvoice-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    image: myorbisvoice-api:latest
    container_name: myorbisvoice-api
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
    networks:
      - internal
      - caddy_app_edge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    image: myorbisvoice-web:latest
    container_name: myorbisvoice-web
    command: ["pnpm", "--filter", "@voiceautomation/web", "start"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.myorbisvoice.com
      NEXT_PUBLIC_GATEWAY_URL: https://gateway.myorbisvoice.com
    networks:
      - internal
      - caddy_app_edge
    depends_on:
      api:
        condition: service_healthy

  voice-gateway:
    build:
      context: ../../
      dockerfile: apps/voice-gateway/Dockerfile
    image: myorbisvoice-gateway:latest
    container_name: myorbisvoice-gateway
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      GATEWAY_PORT: "5000"
    networks:
      - internal
      - caddy_app_edge
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:1.88.0
    container_name: myorbisvoice-n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-voiceautomation}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-voiceautomation}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      EXECUTIONS_MODE: queue
      N8N_HOST: n8n.myorbisvoice.com
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_EDITOR_BASE_URL: https://n8n.myorbisvoice.com
      N8N_WEBHOOK_URL: https://n8n.myorbisvoice.com
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal
      - caddy_n8n_edge
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n-worker:
    image: n8nio/n8n:1.88.0
    container_name: myorbisvoice-n8n-worker
    restart: unless-stopped
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-voiceautomation}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-voiceautomation}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      EXECUTIONS_MODE: queue
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  db-backup:
    image: postgres:16-alpine
    container_name: myorbisvoice-db-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-voiceautomation}
      POSTGRES_USER: ${POSTGRES_USER:-voiceautomation}
    volumes:
      - db_backups:/backups
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # Run pg_dump daily at 2 AM, keep last 30 dumps
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          DUMP_FILE="/backups/db_$$(date +%Y%m%d_%H%M%S).dump"
          pg_dump -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -F c -f "$$DUMP_FILE"
          if [ $$? -eq 0 ]; then
            echo "[backup] Dump written: $$DUMP_FILE"
          else
            echo "[backup] ERROR: pg_dump failed"
          fi
          # Delete dumps older than 30 days
          find /backups -name "*.dump" -mtime +30 -delete
          # Sleep until next 2 AM (86400s = 24h; approximate via fixed sleep)
          sleep 86400
        done


volumes:
  db_backups:
  postgres_data:
  redis_data:
  n8n_data:

networks:
  internal:
    name: myorbisvoice_internal
    driver: bridge
    internal: true
  caddy_app_edge:
    name: bps_zf_caddy_app_edge
    external: true
  caddy_n8n_edge:
    name: bps_zf_caddy_n8n_edge
    external: true
